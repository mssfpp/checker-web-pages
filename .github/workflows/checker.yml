name: Web Page Checker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Chromium
        id: cache-chromium
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        if: steps.cache-chromium.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium system deps
        if: steps.cache-chromium.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run checker
        id: checker
        timeout-minutes: 8
        run: node index.js

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git pull --rebase origin main
          git push

      - name: Update status badge
        run: |
          MESSAGE=$(date -u "+%d %b %H:%M UTC")
          CHECKS="${{ steps.checker.outputs.active_checks }}"
          LABEL="ultimo run · ${CHECKS} check attivi"
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/gists/52f18e040ca29b6905b30fa7fca770d1 \
            -d "{\"files\":{\"status.json\":{\"content\":\"{\\\"schemaVersion\\\":1,\\\"label\\\":\\\"${LABEL}\\\",\\\"message\\\":\\\"${MESSAGE}\\\",\\\"color\\\":\\\"blue\\\"}\"}}}"
